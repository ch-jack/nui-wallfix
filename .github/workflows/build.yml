name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: "3.7"
          - os: windows-latest
            python-version: "3.x"
          - os: ubuntu-latest
            python-version: "3.x"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python
        run: python --version

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: CLI smoke test
        run: python -m nuiwallfix --version

  package:
    name: Package portable CLI
    runs-on: windows-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.7"

      - name: Build zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $stageParent = Join-Path $env:RUNNER_TEMP 'nui-wallfix-package'
          $stage = Join-Path $stageParent 'nui-wallfix'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          foreach ($file in @('README.md', 'SECURITY.md', 'providers.json', 'nui-wallfix.cmd', 'nui-wallfix.py')) {
            Copy-Item -LiteralPath $file -Destination $stage
          }
          Copy-Item -LiteralPath 'nuiwallfix' -Destination $stage -Recurse

          $buildInfo = @(
            'nui-wallfix portable build',
            "ref=$env:GITHUB_REF_NAME",
            "commit=$env:GITHUB_SHA",
            "built_at_utc=$((Get-Date).ToUniversalTime().ToString('o'))"
          )
          Set-Content -LiteralPath (Join-Path $stage 'BUILD.txt') -Value $buildInfo -Encoding UTF8

          python (Join-Path $stage 'nui-wallfix.py') --version

          New-Item -ItemType Directory -Force -Path 'dist' | Out-Null
          Compress-Archive -Path $stage -DestinationPath 'dist/nui-wallfix-windows.zip' -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nui-wallfix-windows-${{ github.sha }}
          path: dist/nui-wallfix-windows.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish official release
    runs-on: windows-latest
    needs: package
    if: github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nui-wallfix-windows-${{ github.sha }}
          path: release

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $asset = Join-Path 'release' 'nui-wallfix-windows.zip'
          $releaseTag = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { "v0.1.$env:GITHUB_RUN_NUMBER" }
          $releaseTitle = $releaseTag
          $notes = @(
            'Official nui-wallfix build.',
            "Source ref: $env:GITHUB_REF_NAME",
            "Commit: $env:GITHUB_SHA"
          ) -join [Environment]::NewLine

          $ErrorActionPreference = 'SilentlyContinue'
          gh release view $releaseTag --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = ($LASTEXITCODE -eq 0)
          $ErrorActionPreference = 'Stop'

          if ($releaseExists) {
            gh release upload $releaseTag $asset --repo $env:GITHUB_REPOSITORY --clobber
            gh release edit $releaseTag --repo $env:GITHUB_REPOSITORY --title $releaseTitle --notes $notes --draft=false --prerelease=false
          } else {
            gh release create $releaseTag $asset --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $releaseTitle --notes $notes --latest
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub release command exited with code $LASTEXITCODE"
          }
